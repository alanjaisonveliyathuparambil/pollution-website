<!DOCTYPE html>
<html>
<head>
    <title>Eco Guardians</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;

            display: flex;
            align-items: center;

            padding: 0 30px;
            z-index: 1000;

            background: rgba(0, 0, 0, 0.4); /* transparent */
            backdrop-filter: blur(6px);
        }

        /* LOGO */
        .logo img {
            height: 75px;
            width: auto;
        }

        /* CENTER NAV */
        .nav {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav a:hover {
            color: #00ff99;
        }

        /* CONTENT */
        .content {
            margin-top: 100px;
        }
    </style>

</head>
<body>

    <!-- HEADER -->
    <div class="header">

        <!-- LOGO -->
        <a href="/" class="logo">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS3aztMgEWsFEEktE-mFvW5On164A9AH7c2wQ&s">
        </a>

        <!-- NAVIGATION -->
        <div class="nav">
            <a href="/">Home</a>
            <a href="/about/">About</a>
        </div>

    </div>

    <!-- PAGE CONTENT -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
